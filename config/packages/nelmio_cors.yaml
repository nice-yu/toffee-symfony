nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin: ['%env(CORS_ALLOW_ORIGIN)%']
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'Authorization', 'Device-Type', 'Device-Id', 'Device-Name', 'OS-Version', 'App-Version', 'Auth-Token', 'Timer', 'Nonce', 'Sign']
        expose_headers: ['Link']
        max_age: 3600
    paths:
        '^/': null
